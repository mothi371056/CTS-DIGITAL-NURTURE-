<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- Sidebar -->
        <div class="col-md-3 bg-dark text-white p-4">
            <h3 class="mb-4">Student Portal</h3>

            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-white">Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-white">Courses</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-white">Assignments</a>
                </li>
                <li class="nav-item mb-2">
                    <a href="#" class="nav-link text-white">Profile</a>
                </li>
            </ul>
        </div>

        <!-- Content -->
        <div class="col-md-9 p-5">
            <h2>Welcome Student</h2>
            <p class="lead">Track your courses and assignments here.</p>

            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body text-center">
                            <h5>Total Courses</h5>
                            <h2>8</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body text-center">
                            <h5>Assignments</h5>
                            <h2>12</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body text-center">
                            <h5>Attendance</h5>
                            <h2>92%</h2>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
