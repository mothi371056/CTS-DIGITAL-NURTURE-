<!DOCTYPE html>
<html>
<head>
    <title>Button Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Button Group</h2>

    <div class="btn-group mb-4">
        <button class="btn btn-primary">Home</button>
        <button class="btn btn-primary">About</button>
        <button class="btn btn-primary">Contact</button>
    </div>

    <h2>Toggle Buttons</h2>

    <input type="checkbox" class="btn-check" id="btn1">
    <label class="btn btn-outline-success" for="btn1">
        Option 1
    </label>

    <input type="checkbox" class="btn-check" id="btn2">
    <label class="btn btn-outline-danger" for="btn2">
        Option 2
    </label>

</div>

</body>
</html>
