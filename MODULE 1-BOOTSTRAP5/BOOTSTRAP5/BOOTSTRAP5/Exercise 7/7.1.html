<!DOCTYPE html>
<html>
<head>
    <title>Typography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="display-1">Bootstrap Typography</h1>

    <p class="lead">
        This is a lead paragraph used to highlight important content.
    </p>

    <p class="text-muted">
        This text is muted.
    </p>

    <p class="fw-bold">
        This text is bold.
    </p>

    <p class="fst-italic">
        This text is italic.
    </p>

</div>

</body>
</html>
