
<!DOCTYPE html>
<html>
<head>
    <title>Pricing Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center mb-5">
        Pricing Plans
    </h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h3>Basic</h3>
                <h1>₹499</h1>
                <p>Starter Package</p>
                <button class="btn btn-outline-primary">
                    Choose Plan
                </button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-lg text-center p-4 border-primary">
                <h3>Pro</h3>
                <h1>₹999</h1>
                <p>Most Popular</p>
                <button class="btn btn-primary">
                    Choose Plan
                </button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h3>Premium</h3>
                <h1>₹1499</h1>
                <p>Advanced Package</p>
                <button class="btn btn-outline-primary">
                    Choose Plan
                </button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
