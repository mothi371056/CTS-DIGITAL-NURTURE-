<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Welcome Banner</title>

    <!-- Internal CSS -->
    <style>

        /* ID Selector */
        #welcomeBanner {
            background-color: bisque;
            color: brown;
            padding: 20px;
            text-align: center;
        }

        /* Class Selector */
        .highlight {
            background-color: grey;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">

        <h1>Welcome to Community Event Portal</h1>

        <p class="highlight">
            Logged-in users can register for events.
        </p>

        <p>
            Special Offer :
            <span style="color:black; font-weight:bold;">
                Free entry for first 100 users!
            </span>
        </p>

    </div>

</body>

</html>
