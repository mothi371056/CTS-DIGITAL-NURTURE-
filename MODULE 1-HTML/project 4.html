<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Community Event Gallery</title>

    <style>

        /* Image Style */
        .eventImage {
            border: 3px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            margin: auto;
        }

        td {
            padding: 10px;
            text-align: center;
        }

    </style>

</head>

<body>

    <h1 align="center">Community Event Gallery</h1>

    <!-- Image Table -->
    <table>

        <!-- Row 1 -->
        <tr>

            <td>

                <img src="photo 1.jpg"
                     alt="Clean City Event"
                     title="Clean City Campaign"
                     class="eventImage">

                <p><b>Clean City Campaign</b></p>

            </td>

            <td>

                <img src="photo 2.jpg"
                     alt="Food Festival"
                     title="Food Festival Event"
                     class="eventImage">

                <p><b>Food Festival</b></p>

            </td>

            <td>

                <img src="photo 3.jpg"
                     alt="Music Program"
                     title="Music Night"
                     class="eventImage">

                <p><b>Music Night</b></p>

            </td>

        </tr>

        <!-- Row 2 -->
        <tr>

            <td>

                <img src="photo 4.jpg"
                     alt="Sports Event"
                     title="Sports Meet"
                     class="eventImage">

                <p><b>Sports Meet</b></p>

            </td>

            <td>

                <img src="photo 5.jpg"
                     alt="Tree Plantation"
                     title="Tree Plantation Drive"
                     class="eventImage">

                <p><b>Tree Plantation Drive</b></p>

            </td>

            <td>

                <img src="photo 6.webp"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="eventImage">

                <p><b>Art Exhibition</b></p>

            </td>

        </tr>

    </table>

</body>

</html>
